<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FriendGroupList</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:linear-gradient(90deg,#ff8c00,#ffb300);
    padding:30px;
    text-align:center;
}

header h1{
    font-size:55px;
}

header p{
    opacity:.9;
    margin-top:10px;
}

.stats{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin:30px;
}

.stat{
    background:#1d1d1d;
    width:180px;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

.stat h2{
    color:gold;
}

.container{
    width:90%;
    max-width:1100px;
    margin:auto;
}

.level{
    display:flex;
    gap:20px;
    background:#1c1c1c;
    margin-bottom:20px;
    border-radius:12px;
    overflow:hidden;
    transition:.25s;
    cursor:pointer;
}

.level:hover{
    transform:scale(1.01);
    background:#262626;
}

.level img{
    width:320px;
    height:180px;
    object-fit:cover;
    background:#333;
}

.info{
    padding:20px;
    flex:1;
}

.rank{
    color:gold;
    font-size:35px;
    font-weight:bold;
}

.name{
    font-size:32px;
    margin-top:5px;
}

.creator{
    margin-top:12px;
    color:#aaa;
}

.points{
    margin-top:10px;
    color:#00ff99;
    font-size:22px;
}

.details{
    max-height:0;
    overflow:hidden;
    transition:.3s;
    margin-top:10px;
}

.level.open .details{
    max-height:400px;
}

.badge{
    display:inline-block;
    background:#333;
    padding:5px 10px;
    border-radius:8px;
    margin:5px;
}

footer{
    margin:50px;
    text-align:center;
    color:#777;
}
</style>
</head>

<body>

<header>
<h1>🏆 FriendGroupList</h1>
<p>The hardest friend-made Geometry Dash levels.</p>
</header>

<div class="stats">

<div class="stat">
<h2>1</h2>
Levels
</div>

<div class="stat">
<h2>3</h2>
Players
</div>

<div class="stat">
<h2>1</h2>
First Victors
</div>

</div>

<div class="container" id="list"></div>

<footer>
FriendGroupList © 2026
</footer>

<script>

const levels = [

{
rank:1,
name:"Dingus Unleashed",
creator:"Useryipee",
verifier:"Useryipee",
firstVictor:"Sirjefferson",
victors:["Sirjefferson"],
points:1000,
image:"Screenshot 2026-07-07 171312.png"
}

];

const container=document.getElementById("list");

levels.forEach(level=>{

const card=document.createElement("div");
card.className="level";

card.innerHTML=`

<img src="${level.image}" onerror="this.src='https://placehold.co/320x180/333333/FFFFFF?text=Upload+Image'">

<div class="info">

<div class="rank">#${level.rank}</div>

<div class="name">${level.name}</div>

<div class="creator">
Created by <b>${level.creator}</b>
</div>

<div class="points">
⭐ ${level.points} Points
</div>

<div class="details">

<p><b>Verifier:</b> ${level.verifier}</p>

<p><b>First Victor:</b> ${level.firstVictor}</p>

<p><b>Victors:</b> ${level.victors.join(", ")}</p>

<br>

<span class="badge">🥇 Top 1</span>
<span class="badge">✔ Verified</span>
<span class="badge">🏆 First Victor</span>

</div>

</div>

`;

card.onclick=()=>{
card.classList.toggle("open");
};

container.appendChild(card);

});

</script>

</body>
</html>
