<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FriendGroupList</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:linear-gradient(90deg,#ff8c00,#ffb300);
    padding:30px;
    text-align:center;
}

header h1{
    font-size:55px;
}

header p{
    margin-top:10px;
    opacity:.9;
}

.stats{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin:30px;
}

.stat{
    background:#1d1d1d;
    width:180px;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

.stat h2{
    color:gold;
}

.container{
    width:90%;
    max-width:1100px;
    margin:auto;
}

.level{
    display:flex;
    gap:20px;
    background:#1c1c1c;
    margin-bottom:20px;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:.25s;
}

.level:hover{
    transform:scale(1.01);
    background:#262626;
}

.level img{
    width:320px;
    height:180px;
    object-fit:cover;
    background:#333;
}

.info{
    padding:20px;
    flex:1;
}

.rank{
    color:gold;
    font-size:34px;
    font-weight:bold;
}

.name{
    font-size:30px;
    margin-top:5px;
}

.creator{
    margin-top:10px;
    color:#bbb;
}

.points{
    margin-top:10px;
    color:#00ff99;
    font-size:22px;
}

.details{
    max-height:0;
    overflow:hidden;
    transition:.3s;
    margin-top:10px;
}

.level.open .details{
    max-height:400px;
}

.badge{
    display:inline-block;
    background:#333;
    padding:5px 10px;
    border-radius:8px;
    margin:5px 5px 0 0;
}

footer{
    text-align:center;
    margin:40px;
    color:#666;
}
</style>
</head>

<body>

<header>
<h1>🏆 FriendGroupList</h1>
<p>The hardest friend-made Geometry Dash levels.</p>
</header>

<div class="stats">
    <div class="stat">
        <h2 id="levelCount">0</h2>
        Levels
    </div>

    <div class="stat">
        <h2 id="playerCount">0</h2>
        Players
    </div>

    <div class="stat">
        <h2 id="victorCount">0</h2>
        First Victors
    </div>
</div>

<div class="container" id="list"></div>

<footer>
FriendGroupList © 2026
</footer>

<script>

const levels = [

{
    rank:2,
    name:"Blue Overdrive",
    creator:"Useryipee",
    verifier:"Cactusman9919",
    firstVictor:"",
    victors:[],
    points:300,
    image:"Screenshot 2026-05-10 131531.png"
},

{
    rank:3,
    name:"Dingus Unleashed",
    creator:"Useryipee",
    verifier:"Useryipee",
    firstVictor:"Sirjefferson",
    victors:[
        "Sirjefferson",
        "Cactusman9919"
    ],
    points:250,
    image:"Screenshot 2026-07-07 171312.png"
}

];

    {
    rank:1,
    name:"Hearing Loss",
    creator:"Useryipee",
    verifier:"Cactusman9919",
    firstVictor:"",
    victors:[
        "",
    ],
    points:200,
    image:"Screenshot 2026-07-08 214231.png"
}

];

// Stats
document.getElementById("levelCount").textContent = levels.length;

const players = new Set();

levels.forEach(level=>{
    if(level.creator) players.add(level.creator);
    if(level.verifier) players.add(level.verifier);
    if(level.firstVictor) players.add(level.firstVictor);

    level.victors.forEach(v=>{
        if(v) players.add(v);
    });
});

document.getElementById("playerCount").textContent = players.size;

document.getElementById("victorCount").textContent =
levels.filter(level=>level.firstVictor !== "").length;


// Cards
const container=document.getElementById("list");

levels.forEach(level=>{

const card=document.createElement("div");
card.className="level";

card.innerHTML=`

<img src="${level.image}" onerror="this.src='https://placehold.co/320x180?text=No+Image'">

<div class="info">

<div class="rank">#${level.rank}</div>

<div class="name">${level.name}</div>

<div class="creator">
Created by <b>${level.creator}</b>
</div>

<div class="points">
⭐ ${level.points} Points
</div>

<div class="details">

<p><b>Verifier:</b> ${level.verifier || "None"}</p>

<p><b>First Victor:</b> ${level.firstVictor || "None Yet"}</p>

<p><b>Victors:</b> ${
level.victors.length ? level.victors.join(", ") : "None"
}</p>

<br>

<span class="badge">#${level.rank}</span>
<span class="badge">✔ Verified</span>

${level.firstVictor ? '<span class="badge">🏆 First Victor</span>' : ""}

</div>

</div>

`;

card.addEventListener("click",()=>{
    card.classList.toggle("open");
});

container.appendChild(card);

});

</script>

</body>
</html>
