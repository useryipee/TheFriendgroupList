<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FriendGroupList</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#090b14;
    --surface:#12152a;
    --surface-2:#1a1e3d;
    --border:#262b52;
    --cyan:#2fe8ff;
    --magenta:#ff3d7f;
    --gold:#ffce3d;
    --text:#eef0fb;
    --muted:#8892b8;
    --font-display:'Orbitron',sans-serif;
    --font-body:'Rajdhani',sans-serif;
    --font-mono:'Share Tech Mono',monospace;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
        radial-gradient(circle at 15% 0%, rgba(47,232,255,0.07), transparent 40%),
        radial-gradient(circle at 85% 10%, rgba(255,61,127,0.07), transparent 40%),
        var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
}

/* ---------- Header ---------- */

header{
    position:relative;
    padding:56px 20px 0;
    text-align:center;
    background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 32px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 32px),
        linear-gradient(160deg,#0d1026,#171b3a 60%,#1a1440);
    overflow:hidden;
}

header .eyebrow{
    font-family:var(--font-mono);
    letter-spacing:4px;
    font-size:12px;
    color:var(--cyan);
    text-transform:uppercase;
}

header h1{
    font-family:var(--font-display);
    font-weight:900;
    font-size:clamp(34px,6vw,64px);
    margin-top:14px;
    letter-spacing:1px;
    background:linear-gradient(90deg,var(--cyan),#7fd8ff 40%,var(--magenta));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 40px rgba(47,232,255,0.15);
}

header p{
    margin:14px auto 0;
    max-width:480px;
    color:var(--muted);
    font-size:17px;
    font-weight:500;
}

.discord-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin:20px auto 40px;
    font-family:var(--font-display);
    font-size:13px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#04121a;
    background:linear-gradient(90deg,#5865F2,#7f8cff);
    padding:11px 22px;
    border-radius:8px;
    text-decoration:none;
    transition:.2s;
}

.discord-link:hover{ filter:brightness(1.1); }

.spike-row{
    display:flex;
    width:100%;
    height:16px;
    line-height:0;
}

.spike-row .spike{
    flex:1 0 auto;
    height:100%;
    clip-path:polygon(50% 0%, 0% 100%, 100% 100%);
}

.spike-row .spike:nth-child(3n){ background:var(--cyan); }
.spike-row .spike:nth-child(3n+1){ background:var(--magenta); }
.spike-row .spike:nth-child(3n+2){ background:var(--gold); }

/* ---------- Tabs ---------- */

.tabs{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:32px 20px 0;
    flex-wrap:wrap;
}

.tab-btn{
    font-family:var(--font-display);
    font-size:13px;
    letter-spacing:1px;
    text-transform:uppercase;
    background:var(--surface);
    color:var(--muted);
    border:1px solid var(--border);
    padding:12px 26px;
    border-radius:8px;
    cursor:pointer;
    transition:.2s;
}

.tab-btn:hover{ color:var(--text); border-color:var(--cyan); }

.tab-btn.active{
    color:#04121a;
    background:linear-gradient(90deg,var(--cyan),#7fd8ff);
    border-color:transparent;
}

.subtabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:24px;
}

.subtab-btn{
    font-family:var(--font-display);
    font-size:12px;
    letter-spacing:1px;
    text-transform:uppercase;
    background:transparent;
    color:var(--muted);
    border:1px solid var(--border);
    padding:8px 20px;
    border-radius:20px;
    cursor:pointer;
    transition:.2s;
}

.subtab-btn:hover{ color:var(--text); border-color:var(--magenta); }

.subtab-btn.active{
    color:#1a0410;
    background:linear-gradient(90deg,var(--magenta),#ff7fb0);
    border-color:transparent;
}

/* ---------- Stats ---------- */

.stats{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:18px;
    margin:32px 20px;
}

.stat{
    background:var(--surface);
    border:1px solid var(--border);
    width:170px;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

.stat h2{
    font-family:var(--font-mono);
    font-size:32px;
    color:var(--gold);
}

.stat span{
    font-size:13px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1px;
}

/* ---------- Layout ---------- */

.view{ display:none; }
.view.active{ display:block; }

.board-view{ display:none; }
.board-view.active{ display:block; }

.container{
    width:92%;
    max-width:1100px;
    margin:0 auto 60px;
}

/* ---------- Levels: sidebar + detail ---------- */

.levels-layout{
    display:flex;
    gap:24px;
    align-items:flex-start;
}

.levels-sidebar{
    width:260px;
    flex-shrink:0;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:10px;
    max-height:640px;
    overflow-y:auto;
}

.sidebar-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 14px;
    border-radius:8px;
    cursor:pointer;
    transition:.15s;
    border-left:3px solid transparent;
}

.sidebar-item:hover{ background:var(--surface-2); }

.sidebar-item.active{
    background:var(--surface-2);
    border-left-color:var(--cyan);
}

.sidebar-rank{
    font-family:var(--font-display);
    font-weight:900;
    font-size:16px;
    color:var(--muted);
    min-width:28px;
}

.sidebar-item.active .sidebar-rank{ color:var(--cyan); }

.sidebar-name{
    font-size:15px;
    color:var(--text);
    font-weight:600;
}

.levels-detail{
    flex:1;
    min-width:0;
}

/* ---------- Level detail card ---------- */

.level{
    display:flex;
    gap:0;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
}

.level.tier-1{ border-color:var(--magenta); }
.level.tier-2{ border-color:var(--cyan); }
.level.tier-3{ border-color:var(--gold); }

.level img{
    width:260px;
    min-width:260px;
    object-fit:cover;
    background:var(--surface-2);
}

.info{
    padding:26px 30px;
    flex:1;
}

.level-top{
    display:flex;
    align-items:baseline;
    gap:16px;
    flex-wrap:wrap;
}

.rank{
    font-family:var(--font-display);
    font-weight:900;
    font-size:40px;
    color:var(--muted);
}

.tier-1 .rank{ color:var(--magenta); text-shadow:0 0 18px rgba(255,61,127,0.5); }
.tier-2 .rank{ color:var(--cyan); text-shadow:0 0 18px rgba(47,232,255,0.4); }
.tier-3 .rank{ color:var(--gold); text-shadow:0 0 18px rgba(255,206,61,0.4); }

.name{
    font-family:var(--font-display);
    font-weight:700;
    font-size:26px;
}

.creator{
    margin-top:8px;
    color:var(--muted);
    font-size:15px;
}

.creator b{ color:var(--text); }

.rating{
    margin-top:14px;
    display:flex;
    align-items:center;
    gap:8px;
}

.rating .spikes{ display:flex; gap:3px; }

.rating .spikes i{
    width:10px;
    height:10px;
    clip-path:polygon(50% 0%, 0% 100%, 100% 100%);
    background:var(--border);
}

.rating .spikes i.lit{ background:var(--gold); }

.rating .pts{
    font-family:var(--font-mono);
    color:var(--gold);
    font-size:14px;
}

.details p{
    font-size:15px;
    color:var(--muted);
    margin-top:14px;
    margin-bottom:6px;
}

.details p b{ color:var(--text); }

.badges{ margin-top:16px; display:flex; gap:8px; flex-wrap:wrap; }

.badge{
    display:inline-block;
    font-family:var(--font-mono);
    font-size:12px;
    background:var(--surface-2);
    border:1px solid var(--border);
    padding:5px 10px;
    border-radius:6px;
}

.badge.win{ border-color:var(--gold); color:var(--gold); }
.badge.debut{ border-color:var(--cyan); color:var(--cyan); }

/* ---------- Leaderboards ---------- */

.board{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
}

.board-row{
    display:grid;
    grid-template-columns:60px 1fr 100px 120px;
    align-items:center;
    padding:16px 22px;
    border-bottom:1px solid var(--border);
    gap:10px;
}

.board-row:last-child{ border-bottom:none; }

.board-row.head{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1px;
    background:var(--surface-2);
}

.board-rank{
    font-family:var(--font-display);
    font-weight:900;
    font-size:20px;
    color:var(--muted);
}

.board-row.p1 .board-rank{ color:var(--magenta); }
.board-row.p2 .board-rank{ color:var(--cyan); }
.board-row.p3 .board-rank{ color:var(--gold); }

.board-name{ font-weight:600; font-size:17px; }
.board-name small{ display:block; color:var(--muted); font-weight:400; font-size:13px; margin-top:2px; }

.board-points{ font-family:var(--font-mono); color:var(--gold); text-align:right; font-weight:600; }
.board-count{ color:var(--muted); font-size:14px; text-align:right; }

.board.creators .board-points{ color:var(--magenta); }

.empty{
    text-align:center;
    padding:40px;
    color:var(--muted);
}

footer{
    text-align:center;
    margin:20px 20px 50px;
    color:var(--muted);
    font-size:13px;
    font-family:var(--font-mono);
}

@media (max-width:800px){
    .levels-layout{ flex-direction:column; }
    .levels-sidebar{ width:100%; max-height:220px; }
}

@media (max-width:640px){
    .level{ flex-direction:column; }
    .level img{ width:100%; height:160px; }
    .board-row{ grid-template-columns:40px 1fr 70px; }
    .board-count{ display:none; }
}
</style>
</head>

<body>

<header>
    <div class="eyebrow">Friend-verified &middot; Hardest to easiest</div>
    <h1>FriendGroupList</h1>
    <p>The hardest friend-made Geometry Dash levels, ranked by the people that beat them.</p>
    <a class="discord-link" href="https://discord.gg/H7FZRYTuDW" target="_blank" rel="noopener">💬 Join the Discord</a>
</header>

<div class="spike-row" id="spikeRow"></div>

<div class="tabs">
    <button class="tab-btn active" data-view="levels">Levels</button>
    <button class="tab-btn" data-view="leaderboard">Leaderboard</button>
</div>

<div class="stats">
    <div class="stat"><h2 id="levelCount">0</h2><span>Levels</span></div>
    <div class="stat"><h2 id="playerCount">0</h2><span>Players</span></div>
    <div class="stat"><h2 id="victorCount">0</h2><span>First Victors</span></div>
</div>

<div class="container">

    <div class="view active" id="levels-view">
        <div class="levels-layout">
            <div class="levels-sidebar" id="levelsSidebar"></div>
            <div class="levels-detail" id="levelsDetail"></div>
        </div>
    </div>

    <div class="view" id="leaderboard-view">
        <div class="subtabs">
            <button class="subtab-btn active" data-board="players">Players</button>
            <button class="subtab-btn" data-board="creators">Creators</button>
        </div>
        <div class="board-view active" data-board="players">
            <div class="board" id="board-players"></div>
        </div>
        <div class="board-view" data-board="creators">
            <div class="board creators" id="board-creators"></div>
        </div>
    </div>

</div>

<footer>FriendGroupList © 2026 &mdash; built by the crew, for the crew</footer>

<script>

// firstPlaced = the rank this level debuted at when it was first added
// to the list, before anything else got reshuffled around it.
const levels = [
    { rank:1, name:"Blue Overdrive", creator:"Useryipee", verifier:"Cactusman9919", firstVictor:"", victors:[], points:428, image:"", firstPlaced:2 },
    { rank:2, name:"Hearing Loss", creator:"Useryipee", verifier:"Cactusman9919", firstVictor:"Samuri815", victors:[{name:"Samuri815",percent:100}], points:379, image:"", firstPlaced:1 },
    { rank:3, name:"One Last Thing", creator:"Useryipee", verifier:"Cactusman9919", firstVictor:"", victors:[], points:341, image:"", firstPlaced:3 },
    { rank:4, name:"Tactile Erosion", creator:"Useryipee", verifier:"Useryipee", firstVictor:"Sirjefferson", victors:[{name:"Sirjefferson",percent:100}], points:296, image:"", firstPlaced:4 },
    { rank:5, name:"Flash Flood", creator:"Useryipee", verifier:"Useryipee", firstVictor:"Cactusman9919", victors:[{name:"Cactusman9919",percent:100},{name:"Sirjefferson",percent:100},{name:"Hexaprism",percent:100}], points:254, image:"", firstPlaced:5 },
    { rank:6, name:"Night Opener", creator:"Useryipee", verifier:"Useryipee", firstVictor:"Sirjefferson", victors:[{name:"Sirjefferson",percent:100},{name:"Cactusman9919",percent:100}], points:201, image:"", firstPlaced:5 },
    { rank:7, name:"Dingus Unleashed", creator:"Useryipee", verifier:"Useryipee", firstVictor:"Sirjefferson", victors:[{name:"Sirjefferson",percent:100},{name:"Cactusman9919",percent:100},{name:"Samuri815",percent:100},{name:"Hexaprism",percent:100}], points:158, image:"", firstPlaced:1 },
    { rank:8, name:"Easy FGL Points", creator:"Useryipee", verifier:"Useryipee", firstVictor:"Cactusman9919", victors:[{name:"Cactusman9919",percent:100},{name:"Sirjefferson",percent:100},{name:"Samuri815",percent:100},{name:"Hexaprism",percent:100}], points:74, image:"", firstPlaced:4 }
];

// ---------- Signature spike divider ----------

const spikeRow = document.getElementById("spikeRow");
for(let i=0;i<50;i++){
    const s = document.createElement("div");
    s.className = "spike";
    spikeRow.appendChild(s);
}

// ---------- Stats ----------

document.getElementById("levelCount").textContent = levels.length;

const allPlayers = new Set();
levels.forEach(level=>{
    if(level.creator) allPlayers.add(level.creator);
    if(level.verifier) allPlayers.add(level.verifier);
    if(level.firstVictor) allPlayers.add(level.firstVictor);
    level.victors.forEach(v=>{ if(v && v.name) allPlayers.add(v.name); });
});

document.getElementById("playerCount").textContent = allPlayers.size;
document.getElementById("victorCount").textContent =
    levels.filter(level=> level.firstVictor !== "").length;

// ---------- Difficulty rating ----------

function ratingFor(points){
    return Math.max(1, Math.min(10, Math.round(points / 50)));
}

function tierFor(rank){
    if(rank === 1) return "tier-1";
    if(rank === 2) return "tier-2";
    if(rank === 3) return "tier-3";
    return "";
}

function tierColorFor(rank){
    if(rank === 1) return "#ff3d7f";
    if(rank === 2) return "#2fe8ff";
    if(rank === 3) return "#ffce3d";
    return "#5b6488";
}

function creatorPointsFor(points){
    return points;
}

function escapeXml(str){
    return String(str).replace(/[&<>"']/g, ch=>({
        "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&apos;"
    }[ch]));
}

// Builds a themed cover image on the fly (rank, name, gradient, spike
// strip) for any level that doesn't have a real screenshot yet. Drop a
// real filename into level.image and it takes over automatically.
function generateCover(level){
    const color = tierColorFor(level.rank);
    const spikeCount = 13;
    const spikeW = 260 / spikeCount;
    let spikes = "";
    for(let i=0;i<spikeCount;i++){
        const x = i * spikeW;
        const fill = i % 2 === 0 ? color : "#12152a";
        spikes += `<polygon points="${x},300 ${x+spikeW/2},278 ${x+spikeW},300" fill="${fill}"/>`;
    }

    const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="260" height="300" viewBox="0 0 260 300">
            <defs>
                <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#171b3a"/>
                    <stop offset="100%" stop-color="#0d1026"/>
                </linearGradient>
            </defs>
            <rect width="260" height="300" fill="url(#bg)"/>
            <g opacity="0.06" stroke="#ffffff">
                ${Array.from({length:8}, (_,i)=>`<line x1="0" y1="${i*38}" x2="260" y2="${i*38}"/>`).join("")}
            </g>
            <circle cx="130" cy="118" r="58" fill="none" stroke="${color}" stroke-width="2" opacity="0.4"/>
            <text x="130" y="135" font-family="Orbitron, sans-serif" font-weight="900" font-size="56" fill="${color}" text-anchor="middle">#${level.rank}</text>
            <text x="130" y="200" font-family="Rajdhani, sans-serif" font-weight="700" font-size="19" fill="#eef0fb" text-anchor="middle">${escapeXml(level.name)}</text>
            <text x="130" y="222" font-family="Share Tech Mono, monospace" font-size="13" fill="${color}" text-anchor="middle">${level.points} PTS</text>
            ${spikes}
        </svg>
    `;

    return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
}

// ---------- Levels: sidebar + detail ----------

const sidebar = document.getElementById("levelsSidebar");
const detail = document.getElementById("levelsDetail");

function renderDetail(level){
    const rating = ratingFor(level.points);
    let spikesHtml = "";
    for(let i=1;i<=10;i++){
        spikesHtml += `<i class="${i<=rating ? 'lit' : ''}"></i>`;
    }

    const victorsList = level.victors.length
        ? level.victors.map(v=> `${v.name}${v.percent < 100 ? ` (${v.percent}%)` : ""}`).join(", ")
        : "None yet";

    detail.innerHTML = `
        <div class="level ${tierFor(level.rank)}">
            <img src="${level.image || generateCover(level)}" onerror="this.src='https://placehold.co/260x300/12152a/2fe8ff?text=No+Image'">
            <div class="info">
                <div class="level-top">
                    <div class="rank">#${level.rank}</div>
                    <div class="name">${level.name}</div>
                </div>
                <div class="creator">Created by <b>${level.creator}</b></div>
                <div class="rating">
                    <div class="spikes">${spikesHtml}</div>
                    <div class="pts">${level.points} PTS</div>
                </div>
                <div class="details">
                    <p><b>Verifier:</b> ${level.verifier || "None"}</p>
                    <p><b>First Victor:</b> ${level.firstVictor || "None yet"}</p>
                    <p><b>Victors:</b> ${victorsList}</p>
                </div>
                <div class="badges">
                    <span class="badge">CURRENT RANK #${level.rank}</span>
                    <span class="badge debut">FIRST PLACED AT #${level.firstPlaced}</span>
                    <span class="badge">VERIFIED</span>
                    ${level.firstVictor ? '<span class="badge win">FIRST VICTOR</span>' : ""}
                </div>
            </div>
        </div>
    `;
}

function renderSidebar(){
    sidebar.innerHTML = "";

    levels.forEach((level, i)=>{
        const item = document.createElement("div");
        item.className = "sidebar-item" + (i === 0 ? " active" : "");
        item.innerHTML = `
            <span class="sidebar-rank">#${level.rank}</span>
            <span class="sidebar-name">${level.name}</span>
        `;
        item.addEventListener("click", ()=>{
            document.querySelectorAll(".sidebar-item").forEach(el=> el.classList.remove("active"));
            item.classList.add("active");
            renderDetail(level);
        });
        sidebar.appendChild(item);
    });
}

renderSidebar();
renderDetail(levels[0]);

// ---------- Leaderboard math: two independent boards ----------

function creditFractionsFor(level){
    const fractions = new Map();

    function offer(name, fraction){
        if(!name) return;
        const current = fractions.get(name) || 0;
        if(fraction > current) fractions.set(name, fraction);
    }

    offer(level.verifier, 1);
    offer(level.firstVictor, 1);
    level.victors.forEach(v=>{
        if(v && v.name) offer(v.name, (v.percent || 0) / 100);
    });

    return fractions;
}

function computePlayerLeaderboard(levelsData){
    const map = new Map();

    levelsData.forEach(level=>{
        const fractions = creditFractionsFor(level);

        fractions.forEach((fraction, player)=>{
            if(!map.has(player)){
                map.set(player, { name:player, points:0, count:0, hardestRank:Infinity, hardestName:"" });
            }
            const entry = map.get(player);
            entry.points += Math.round(level.points * fraction);
            entry.count += 1;
            if(level.rank < entry.hardestRank){
                entry.hardestRank = level.rank;
                entry.hardestName = level.name;
            }
        });
    });

    return Array.from(map.values()).sort((a,b)=> b.points - a.points);
}

function computeCreatorLeaderboard(levelsData){
    const map = new Map();

    levelsData.forEach(level=>{
        if(!level.creator) return;

        if(!map.has(level.creator)){
            map.set(level.creator, { name:level.creator, points:0, count:0, hardestRank:Infinity, hardestName:"" });
        }
        const entry = map.get(level.creator);
        entry.points += creatorPointsFor(level.points);
        entry.count += 1;
        if(level.rank < entry.hardestRank){
            entry.hardestRank = level.rank;
            entry.hardestName = level.name;
        }
    });

    return Array.from(map.values()).sort((a,b)=> b.points - a.points);
}

function renderPlayerBoard(container, levelsData){
    const ranked = computePlayerLeaderboard(levelsData);

    if(ranked.length === 0){
        container.innerHTML = `<div class="empty">No completions logged yet.</div>`;
        return;
    }

    container.innerHTML = `
        <div class="board-row head">
            <div>#</div>
            <div>Player</div>
            <div style="text-align:right">Points</div>
            <div style="text-align:right">Levels</div>
        </div>
    ` + ranked.map((p,i)=>`
        <div class="board-row p${i+1}">
            <div class="board-rank">${i+1}</div>
            <div class="board-name">${p.name}<small>Hardest beaten: ${p.hardestName}</small></div>
            <div class="board-points">${p.points}</div>
            <div class="board-count">${p.count} level${p.count === 1 ? "" : "s"}</div>
        </div>
    `).join("");
}

function renderCreatorBoard(container, levelsData){
    const ranked = computeCreatorLeaderboard(levelsData);

    if(ranked.length === 0){
        container.innerHTML = `<div class="empty">No levels built yet.</div>`;
        return;
    }

    container.innerHTML = `
        <div class="board-row head">
            <div>#</div>
            <div>Creator</div>
            <div style="text-align:right">Points</div>
            <div style="text-align:right">Built</div>
        </div>
    ` + ranked.map((p,i)=>`
        <div class="board-row p${i+1}">
            <div class="board-rank">${i+1}</div>
            <div class="board-name">${p.name}<small>Hardest built: ${p.hardestName}</small></div>
            <div class="board-points">${p.points}</div>
            <div class="board-count">${p.count} level${p.count === 1 ? "" : "s"}</div>
        </div>
    `).join("");
}

renderPlayerBoard(document.getElementById("board-players"), levels);
renderCreatorBoard(document.getElementById("board-creators"), levels);

// ---------- Tabs ----------

document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
        document.getElementById(`${btn.dataset.view}-view`).classList.add("active");
    });
});

// ---------- Sub-tabs (Players vs Creators) ----------

document.querySelectorAll(".subtab-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        const group = btn.closest(".view");

        group.querySelectorAll(".subtab-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        group.querySelectorAll(".board-view").forEach(v=>{
            v.classList.toggle("active", v.dataset.board === btn.dataset.board);
        });
    });
});

</script>

</body>
</html>
